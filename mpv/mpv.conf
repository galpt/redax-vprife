# =============================================================================
# mpv.conf — Base configuration for RIFE video interpolation via VapourSynth
# Target: NVIDIA RTX 3050 4 GB VRAM
# =============================================================================
# Place this file in %APPDATA%\mpv\ (Windows) or ~/.config/mpv/ (Linux/macOS)
# =============================================================================

# --- General ---
profile=gpu-hq
keep-open=yes
save-position-on-quit=yes

# --- Video Output ---
vo=gpu-next
gpu-api=vulkan            # ncnn-Vulkan requires Vulkan; keep consistent
gpu-context=auto
hwdec=no                  # Disable HW decode to keep VRAM free for RIFE

# --- Display ---
fullscreen=no
hidpi-window-scale=yes

# --- Audio ---
audio-file-auto=no
volume=100
volume-max=200

# --- OSD / Interface ---
osd-level=1
osd-font-size=28
osd-msg1=${?estimated-display-fps:${estimated-display-fps} fps}

# --- Performance ---
cache=yes
cache-secs=10
demuxer-max-bytes=150M
demuxer-max-back-bytes=50M

# --- Frame Timing ---
video-sync=display-resample # Match display refresh rate
video-sync-max-video-change=5
interpolation=no            # RIFE does the interpolation, not mpv
tscale=no                   # Disable mpv's own temporal scaler

# =============================================================================
# RIFE Profiles — select one via --profile=rife-720p or --profile=rife-1080p
# =============================================================================

[rife-720p]
profile-desc="RIFE 2x interpolation at 720p (recommended for RTX 3050 4GB)"
vf=vapoursynth="~~/vapoursynth/rife-720p.vpy"

[rife-1080p]
profile-desc="RIFE 2x interpolation at 1080p (may drop frames on 4GB VRAM)"
vf=vapoursynth="~~/vapoursynth/rife.vpy"

[rife-anime]
profile-desc="RIFE 2x interpolation using anime-tuned model"
vf=vapoursynth="~~/vapoursynth/rife-anime.vpy"
